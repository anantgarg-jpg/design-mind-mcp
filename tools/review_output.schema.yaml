tool: review_output
version: 1.0.0
description: >
  Call after generating UI to get a structured critique from the
  Critic agent. Returns what honored the genome, what was borderline,
  what was novel, and what to fix.

input:
  generated_output:
    type: string
    required: true
    description: The generated code or detailed description of the UI

  original_intent:
    type: string
    required: true
    description: The same intent_description passed to consult_before_build

  context_used:
    type: object
    required: false
    description: The context returned from consult_before_build, if available

output:
  honored:
    type: array
    items:
      observation: string
      rule_or_pattern_ref: string

  borderline:
    type: array
    description: >
      Tensions between competing rules, plus any high-confidence recommended
      blocks from consult_before_build that were not imported in the output.
    items:
      observation: string
      tension: string
      recommendation: string

  novel:
    type: array
    items:
      description: string
      coherent_with_taste: boolean
      coherence_reasoning: string

  fix:
    type: array
    description: >
      All violations requiring correction before the output is shippable.
      Includes hard-constraint violations, primitive violations (rules 22 & 25),
      and soft genome violations. Items with safety_block: true must be resolved
      first — they represent non-negotiable blockers.
    items:
      problem: string
      rule_violated: string
      correction: string
      safety_block: boolean   # true = blocker; false = soft fix

  primitive_violations:
    type: array
    description: >
      Subset of fix items that originate specifically from hard-constraint rules
      22 (className override of family_invariants) and 25 (primitive block
      reimplemented inline). All items here also appear in fix with
      safety_block: true. Surfaced separately so consumers can gate on primitive
      compliance independently of other fix categories.
    items:
      problem: string
      rule_violated: string   # always 'safety/hard-constraints.md rule 22' or '... rule 25'
      correction: string
      safety_block: boolean   # always true

  copy_violations:
    type: array
    description: Copy-voice and clinical language violations
    items:
      rule: string
      found: string
      correction: string

  invariant_check:
    type: array
    description: >
      Per-primitive invariant audit. One entry per primitive that is in scope
      (imported, referenced as JSX, found as a raw HTML element, re-implemented
      via a <style> block, or recommended with relevance_score ≥ 0.45).
      Replaces name-based heuristics with invariant-level verification — a block
      is only classified as "correct" when its family_invariants are actually
      satisfied, not merely when a similarly-named CSS class exists.

      detection_method values:
        import               — found via @/blocks/, @/components/ui/, or @/components/
        jsx_usage            — used as JSX element but no recognised import path found
        style_reimplementation — re-implemented as a CSS class in a <style> block (rule 25)
        inline_tailwind      — raw HTML element (<button>, <input> …) with inline classes
        not_found            — in scope (recommended) but absent from the output

      verdict values:
        correct            — all family_invariants satisfied, no conflicts
        partial            — imported/used but one or more invariants missing or className conflict
        variant_violation  — imported but an undocumented variant prop was used
        reimplemented      — found as a <style> block CSS class (always a rule 25 violation)
        partial_inline     — raw HTML element with some but not all invariants inline
        absent             — recommended but not found anywhere in the output
    items:
      block: string               # PascalCase primitive id, e.g. "Button"
      detection_method: string    # one of the values above
      invariants_present:         # family_invariant strings that were satisfied
        type: array
        items: string
      invariants_missing:         # family_invariant strings that were not satisfied
        type: array
        items: string
      verdict: string             # one of the verdict values above

  candidate_patterns:
    type: array
    description: Novel items worth promoting to the genome
    items:
      name: string
      description: string
      promoted_to_candidates: boolean

  confidence:
    type: number
    description: >
      Overall genome compliance score (0.0–1.0). Safety-block violations
      (hard-constraint and primitive) deduct 20% each; soft fixes 10%;
      borderline and copy violations 5% each.

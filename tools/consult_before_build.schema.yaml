tool: consult_before_build
version: 2.0.0
description: >
  REQUIRED before generating ANY UI — component, page, surface, or style change.
  Returns the design genome: component code templates, layout blueprints, safety
  constraints, and copy rules for this platform. The response is a construction
  packet — use it as a blueprint, not as suggestions.

  HOW TO CALL:
  1. Describe WHAT you are building. Be specific — include who uses it, what data
     it shows, what actions are available, and whether this is a new build or modification.
  2. Send a SCOPE HINT: "surface" (full page/panel), "block" (single component),
     "token" (styling/spacing question).
  3. Include domain and user_type if you can infer them from the codebase.

  The server matches your description against its knowledge base. If it finds a known
  page blueprint, it returns a full construction plan with layout regions, component
  assignments, ordering rules, and hard constraints. If not, it returns the best
  matching components with code templates for you to compose.

  WRITING A GOOD DESCRIPTION:
    Good: "Coordinator-facing page showing prioritised patients with open care gaps.
          Each row: patient name, risk tier, gap status, due date. Actions: Close Gap."
    Bad: "a worklist"

  HOW TO USE THE RESPONSE:
  Read build_mode FIRST. "surface-first" means follow the blueprint exactly.
  "block-composition" means compose from the returned blocks.
  component_tsx in each block is the EXACT code template — copy the structure,
  adapt only data source and state management.
  safety_constraints are non-negotiable.

input:
  intent_description:
    type: string
    required: true
    description: "Rich description of what to build — who uses it, what data it shows, what actions are available"

  scope:
    type: string
    enum: ["surface", "block", "token"]
    required: true
    description: "Routing hint: surface=full page, block=single component, token=styling question"

  domain:
    type: string
    enum: ["clinical-alerts", "patient-data", "care-gaps", "tasks", "navigation", "data-display", "forms", "admin", "other"]
    required: false

  user_type:
    type: array
    items:
      type: string
      enum: ["clinician", "coordinator", "patient", "admin", "data-engineer"]
    required: false

output:
  build_mode:
    type: object
    description: >
      How to proceed. mode="surface-first" means a known page blueprint was matched —
      follow it exactly. mode="block-composition" means compose from returned blocks.

  surface:
    type: object
    description: Surface blueprint data when build_mode is surface-first.

  blocks:
    type: array
    description: Matched blocks with code templates and constraints.
    items:
      id: string
      level: string
      meta_yaml: string
      component_tsx: string
      family_invariants:
        type: array
        items: string
      import_path: string
      when: string
      not_when: string

  primitive_guard:
    type: object
    description: >
      ALL active primitive blocks — always present. family_invariants are immutable.
    properties:
      instruction: string
      primitives:
        type: array
        items:
          id: string
          import_path: string
          family_invariants:
            type: array
            items: string

  rules:
    type: array
    description: Applicable cross-component rules with full content.
    items:
      rule_id: string
      summary: string
      applies_because: string
      full_content: string

  safety_constraints:
    type: array
    description: Hard constraints in scope for this intent.
    items:
      constraint_id: string
      rule: string
      applies_because: string

  ontology_refs:
    type: array
    description: Relevant ontology concept references.
    items:
      type: string

  confidence:
    type: number
    description: How well the genome covers this intent (0.0–1.0).

  gaps:
    type: array
    description: What the system does not have coverage for.
    items:
      type: string

id: Alert
status: active
component_type: feedback
level: primitive
npm_path: "@innovaccer/ui-assets/block-primitives/Alert"
structural_family: feedback-banner
confidence: 0.85
version: 1.0.0

summary: >
  Inline contextual message for non-critical feedback. presents informational
  or warning-level messages within the page flow.
  Not intended for safety-critical alerts — use AlertBanner for those.

when:
  - displaying inline validation summaries or contextual tips
  - showing non-blocking informational or warning messages
  - providing contextual guidance within a form or section

not_when:
  - safety-critical or severity-based alerts (use AlertBanner)
  - transient notifications that should auto-dismiss (use Toast)
  - global page-level errors

variants:
  access: use for access-related messages such as permissions, entitlements, or restricted content
  destructive: use for error states, failed actions, or destructive outcomes requiring user attention
  warning: use for cautionary messages where action may lead to unintended consequences
  alert: use for important notices that require acknowledgment but are not errors

key_rules:
  - not for safety-critical alerts (use AlertBanner)
  - never auto-dismiss — user must navigate away or resolve

embedding_hint: >
  alert info warning feedback
  contextual notice tip guidance

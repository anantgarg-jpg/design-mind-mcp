description: >
  A three-panel full-viewport workstation surface for revenue cycle coding staff. Left panel: dark sidebar navigation with worklist links and badge counts. Center panel: AI coding assistant chat with quick-action chips and inline code/card responses. Right panel: claims worklist with summary stats, filterable table showing patient, payer, amount, issues, age (days), and status columns with row-level actions.


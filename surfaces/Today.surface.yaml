id: Today
type: surface
npm_path: @innovaccer/ui-assets/surfaces/Today
user_type: [coordinator]

intent: >
  The coordinator's daily summary view. A curated snapshot of what matters today —
  not everything, not a dashboard. Designed to orient the coordinator at the start
  of a session and surface the highest-priority items requiring attention.

what_it_omits:
  - item: Resolved and completed items
    reason: "Today is a priority surface. Completed work is noise — it distracts from what still needs action. Historical views belong in reporting."
  - item: Metrics and aggregate counts as the primary content
    reason: "Counts imply quota. This surface is about clinical priority, not volume. A coordinator should act on items, not manage a number."
  - item: Navigation or settings chrome
    reason: "The shell handles navigation. Embedding nav chrome inside Today violates the 3-panel shell rule and creates ambiguous wayfinding."

empty_state_meaning: >
  No priority items today. Positive signal — the coordinator's panel is clear.
  Never "no data available."

ordering: >
  Critical alerts first, then high-urgency care gaps, then tasks due today.
  Section order is fixed — never user-configurable on this surface.

actions:
  - label: contextual per item type
    stage: inline on each item
    constraint: quick actions only — no multi-step flows initiated from Today

never:
  - Show a comprehensive list of all patients — this is a priority surface, not a list
  - Use count-based headline metrics as the primary content (e.g. "12 gaps open")
  - Allow configuration or customisation of the Today view layout

regions:
  - slot: alerts-section-header
    block_id: SectionHeader
    props_hint: "label='CRITICAL ALERTS' count={criticalAlertCount} countVariant='urgent'"
    layout_hint: "flex flex-row items-center justify-between px-4 py-2"

  - slot: alerts
    block_id: AlertBanner
    props_hint: "severity={alert.severity} title={alert.title} body={alert.body} contextLabel={alert.patientName} onAcknowledge={handleAcknowledge}"
    layout_hint: "flex flex-col gap-0 w-full"

  - slot: gaps-section-header
    block_id: SectionHeader
    props_hint: "label='CARE GAPS DUE TODAY' count={gapCount} countVariant='warning'"
    layout_hint: "flex flex-row items-center justify-between px-4 py-2 mt-4"

  - slot: gaps-list
    block_id: ActionableRow
    props_hint: "variant='row' title={gap.measureName} contextLabel={gap.patientName} accent={gap.overdue ? 'warning' : 'accent'} primaryAction={{ label: 'Close Gap', onClick: handleCloseGap }} meta=[{icon: CalendarIcon, text: gap.dueDate}]"
    layout_hint: "flex flex-col bg-card rounded-lg border border-border overflow-hidden"

  - slot: tasks-section-header
    block_id: SectionHeader
    props_hint: "label='TASKS DUE TODAY' count={taskCount}"
    layout_hint: "flex flex-row items-center justify-between px-4 py-2 mt-4"

  - slot: tasks-list
    block_id: ActionableRow
    props_hint: "variant='row' title={task.title} contextLabel={task.patientName} status={task.status} accent='none' primaryAction={{ label: 'Complete', onClick: handleComplete }}"
    layout_hint: "flex flex-col bg-card rounded-lg border border-border overflow-hidden"

  - slot: empty-state
    block_id: Alert
    props_hint: "variant='default' title='Panel clear' description='No priority items for today.'"
    layout_hint: "flex items-center justify-center p-8"

  - slot: loading
    block_id: Skeleton
    props_hint: "variant='card' count={6}"
    layout_hint: "flex flex-col gap-2 px-4 py-3"

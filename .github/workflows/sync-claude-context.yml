name: Sync Claude Project Context

on:
  push:
    branches: [main]
    paths:
      - 'genome/**'
      - 'ontology/**'
      - 'patterns/**'
      - 'surfaces/**'
      - 'safety/**'
      - 'agents/**'
      - 'tools/**'
      - 'scripts/generate-context.js'
  workflow_dispatch:

jobs:
  generate-and-commit:
    name: Regenerate project-context-full.md
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate context file
        run: node scripts/generate-context.js

      - name: Check if file changed
        id: diff
        run: |
          git diff --quiet project-context-full.md || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated context
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add project-context-full.md
          git commit -m "chore: regenerate project-context-full.md [skip ci]"
          git push

      - name: No changes
        if: steps.diff.outputs.changed != 'true'
        run: echo "project-context-full.md is already up to date."

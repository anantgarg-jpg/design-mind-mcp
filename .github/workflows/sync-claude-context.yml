name: Sync Claude Project Context

on:
  push:
    branches: [main]
    paths:
      # Trigger only when design content changes — not on every commit
      - 'genome/**'
      - 'ontology/**'
      - 'patterns/**'
      - 'surfaces/**'
      - 'safety/**'
      - 'agents/**'
      - 'tools/**'
      - 'scripts/generate-context.js'
  workflow_dispatch:
    # Also runnable manually from the GitHub Actions tab

jobs:
  generate-and-commit:
    name: Regenerate project-context-full-vN.md
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit the generated file back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install server deps (for ESM support)
        run: |
          # Only need Node — no extra deps required by generate-context.js
          node --version

      - name: Generate context file
        run: node scripts/generate-context.js

      - name: Check for new version file
        id: diff
        run: |
          git status --short | grep "^?? project-context-full-v" \
            && echo "changed=true" >> $GITHUB_OUTPUT || true

      - name: Commit and push updated context
        if: steps.diff.outputs.changed == 'true'
        run: |
          NEW_FILE=$(git status --short | grep "^?? project-context-full-v" | awk '{print $2}')
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add $NEW_FILE
          git commit -m "chore: add ${NEW_FILE} [skip ci]

          Auto-generated by sync-claude-context workflow.
          Reflects latest patterns, genome rules, ontology, and surfaces."
          git push

      - name: No changes
        if: steps.diff.outputs.changed != 'true'
        run: echo "No new version file generated — nothing to commit."
